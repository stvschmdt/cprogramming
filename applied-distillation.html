<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applied ML: Knowledge Distillation — Steve Schmidt</title>
  <style>
    :root {
      --bg: #fafaf9;
      --text: #1c1917;
      --muted: #57534e;
      --accent: #b45309;
      --border: #e7e5e4;
      --card-bg: #ffffff;
      --highlight-bg: #fffbeb;
      --highlight-border: #d97706;
      --code-bg: #f5f5f4;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Georgia", "Times New Roman", serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 17px; }
    a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
    a:hover { border-bottom-color: var(--accent); }
  </style>
</head>
<body>test</body>
</html>
